name: GitHub-Profile-3D-Contrib

on:
  # 毎日 18:00 UTC（翌3:00 JST）に更新
  schedule:
    - cron: "0 18 * * *"
  # 手動実行
  workflow_dispatch:

# 注: このアクションは profile-3d-contrib/ を main にコミットするため、
#     push トリガーは付けない（無限ループ防止）

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-3d-contrib
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Generate 3D contribution graph
        uses: yoshi389111/github-profile-3d-contrib@v0.9.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          SETTING_JSON: .github/profile-3d-football.json

      - name: Commit & Push
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A profile-3d-contrib
            git commit -m "chore: update 3d contribution graph"
            git push
          else
            echo "No changes to commit."
          fi
