<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="800" height="260" role="img" aria-label="A football being kicked into the goal on a pitch">
  <defs>
    <clipPath id="pitch"><rect x="0" y="0" width="800" height="260" rx="10"/></clipPath>
  </defs>

  <g clip-path="url(#pitch)">
    <!-- Pitch base -->
    <rect x="0" y="0" width="800" height="260" fill="#2e7d32"/>
    <!-- Mowing stripes -->
    <g fill="#339a3a">
      <rect x="0"   y="0" width="100" height="260"/>
      <rect x="200" y="0" width="100" height="260"/>
      <rect x="400" y="0" width="100" height="260"/>
      <rect x="600" y="0" width="100" height="260"/>
    </g>

    <!-- Markings -->
    <g fill="none" stroke="#ffffff" stroke-width="3" opacity="0.85">
      <!-- outer line -->
      <rect x="14" y="14" width="772" height="232" rx="4"/>
      <!-- centre line (left) -->
      <line x1="120" y1="14" x2="120" y2="246"/>
      <circle cx="120" cy="130" r="42"/>
      <circle cx="120" cy="130" r="3" fill="#ffffff" stroke="none"/>
      <!-- penalty box (right) -->
      <rect x="640" y="60" width="146" height="140"/>
      <rect x="724" y="92" width="62" height="76"/>
      <path d="M 640 96 A 44 44 0 0 0 640 164"/>
    </g>

    <!-- Goal + net (right) -->
    <g transform="translate(742,56)">
      <g id="net">
        <!-- net background -->
        <rect x="6" y="0" width="40" height="150" fill="#ffffff" opacity="0.10"/>
        <!-- net mesh -->
        <g stroke="#ffffff" stroke-width="1" opacity="0.55">
          <line x1="6"  y1="0" x2="6"  y2="150"/>
          <line x1="16" y1="0" x2="16" y2="150"/>
          <line x1="26" y1="0" x2="26" y2="150"/>
          <line x1="36" y1="0" x2="36" y2="150"/>
          <line x1="46" y1="0" x2="46" y2="150"/>
          <line x1="6" y1="15"  x2="46" y2="15"/>
          <line x1="6" y1="45"  x2="46" y2="45"/>
          <line x1="6" y1="75"  x2="46" y2="75"/>
          <line x1="6" y1="105" x2="46" y2="105"/>
          <line x1="6" y1="135" x2="46" y2="135"/>
        </g>
        <animateTransform attributeName="transform" type="translate"
          values="0 0; 0 0; 3 1; -2 0; 1 0; 0 0"
          keyTimes="0; 0.80; 0.86; 0.91; 0.96; 1"
          dur="2.8s" repeatCount="indefinite"/>
      </g>
      <!-- posts -->
      <g stroke="#ffffff" stroke-width="6" stroke-linecap="round">
        <line x1="6" y1="0" x2="6" y2="150"/>
        <line x1="6" y1="0" x2="50" y2="-8"/>
        <line x1="50" y1="-8" x2="50" y2="142"/>
      </g>
    </g>

    <!-- Ball (animated kick into goal) -->
    <g>
      <animateMotion dur="2.8s" repeatCount="indefinite"
        keyPoints="0;1" keyTimes="0;1"
        path="M 110 190 Q 420 40 740 150"/>
      <g opacity="1">
        <animate attributeName="opacity"
          values="0;1;1;1;0;0" keyTimes="0;0.06;0.74;0.82;0.9;1"
          dur="2.8s" repeatCount="indefinite"/>
        <!-- shadow -->
        <ellipse cx="0" cy="20" rx="14" ry="4" fill="#1b5e20" opacity="0.35"/>
        <!-- spinning ball -->
        <g>
          <animateTransform attributeName="transform" type="rotate"
            from="0" to="360" dur="0.7s" repeatCount="indefinite"/>
          <circle r="14" fill="#ffffff" stroke="#222222" stroke-width="1"/>
          <polygon points="0,-5 4.8,-1.5 3,4 -3,4 -4.8,-1.5" fill="#1a1a1a"/>
          <g stroke="#1a1a1a" stroke-width="1.4">
            <line x1="0"    y1="-5"   x2="0"    y2="-13"/>
            <line x1="4.8"  y1="-1.5" x2="12"   y2="-4"/>
            <line x1="3"    y1="4"    x2="7"    y2="11"/>
            <line x1="-3"   y1="4"    x2="-7"   y2="11"/>
            <line x1="-4.8" y1="-1.5" x2="-12"  y2="-4"/>
          </g>
        </g>
      </g>
    </g>
  </g>
</svg>
